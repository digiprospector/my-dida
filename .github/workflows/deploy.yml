name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者是你的默认分支名

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Secrets
        run: |
          sed -i "s|___SUPABASE_URL___|${{ secrets.SUPABASE_URL }}|g" app.js
          sed -i "s|___SUPABASE_ANON_KEY___|${{ secrets.SUPABASE_ANON_KEY }}|g" app.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
